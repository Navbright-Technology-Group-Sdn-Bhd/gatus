endpoints:
  - name: ggrmotor website
    group: website availability
    url: "https://ggrmotor.com"
    interval: 5m
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 5000"

  - name: navbright website
    group: website availability
    url: "https://navbright.com"
    interval: 5m
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 5000"

  - name: brillionex website
    group: website availability
    url: "https://brillionex.com"
    interval: 5m
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 5000"

  - name: easehubs website
    group: website availability
    url: "https://easehubs.com"
    interval: 5m
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 5000"

  - name: ggrmotor SSL certificate
    group: SSL certificates
    url: "https://ggrmotor.com"
    interval: 1h
    conditions:
      - "[CERTIFICATE_EXPIRATION] > 720h"
    ui:
      resolve-successful-conditions: true

  - name: navbright SSL certificate
    group: SSL certificates
    url: "https://navbright.com"
    interval: 1h
    conditions:
      - "[CERTIFICATE_EXPIRATION] > 720h"
    ui:
      resolve-successful-conditions: true

  - name: brillionex SSL certificate
    group: SSL certificates
    url: "https://brillionex.com"
    interval: 1h
    conditions:
      - "[CERTIFICATE_EXPIRATION] > 720h"
    ui:
      resolve-successful-conditions: true

  - name: easehubs SSL certificate
    group: SSL certificates
    url: "https://easehubs.com"
    interval: 1h
    conditions:
      - "[CERTIFICATE_EXPIRATION] > 720h"
    ui:
      resolve-successful-conditions: true

  - name: ggrmotor domain expiry
    group: domain expiry
    url: "https://ggrmotor.com"
    interval: 12h
    conditions:
      - "[DOMAIN_EXPIRATION] > 720h"
    ui:
      resolve-successful-conditions: true

  - name: navbright domain expiry
    group: domain expiry
    url: "https://navbright.com"
    interval: 12h
    conditions:
      - "[DOMAIN_EXPIRATION] > 720h"
    ui:
      resolve-successful-conditions: true

  - name: brillionex domain expiry
    group: domain expiry
    url: "https://brillionex.com"
    interval: 12h
    conditions:
      - "[DOMAIN_EXPIRATION] > 720h"
    ui:
      resolve-successful-conditions: true

  - name: easehubs domain expiry
    group: domain expiry
    url: "https://easehubs.com"
    interval: 12h
    conditions:
      - "[DOMAIN_EXPIRATION] > 720h"
    ui:
      resolve-successful-conditions: true

  - name: ggrmotor DNS
    group: DNS resolution
    url: "1.1.1.1"
    interval: 5m
    dns:
      query-name: "ggrmotor.com"
      query-type: "A"
    conditions:
      - "[DNS_RCODE] == NOERROR"

  - name: navbright DNS
    group: DNS resolution
    url: "1.1.1.1"
    interval: 5m
    dns:
      query-name: "navbright.com"
      query-type: "A"
    conditions:
      - "[DNS_RCODE] == NOERROR"

  - name: brillionex DNS
    group: DNS resolution
    url: "1.1.1.1"
    interval: 5m
    dns:
      query-name: "brillionex.com"
      query-type: "A"
    conditions:
      - "[DNS_RCODE] == NOERROR"

  - name: easehubs DNS
    group: DNS resolution
    url: "1.1.1.1"
    interval: 5m
    dns:
      query-name: "easehubs.com"
      query-type: "A"
    conditions:
      - "[DNS_RCODE] == NOERROR"
